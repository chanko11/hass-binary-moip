# Example Home Assistant dashboard for the Binary MoIP zones.
#
# Paste into: Settings -> Dashboards -> (a dashboard) -> top-right menu ->
# "Edit dashboard" -> top-right menu -> "Raw configuration editor".
# Replace the whole contents, or merge the `views:` entry into your own.
#
# Grouped by amp/building because areas aren't assigned yet. Once you set an
# area per zone (Settings -> Devices), an Area card or auto-entities by area is
# the cleaner long-term layout. Each Media Control card shows the source
# dropdown (incl. "None" to unpair), volume slider, and mute.

title: Binary MoIP
views:
  - title: MoIP Zones
    path: moip-zones
    type: sections
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Main House (Main 6 Zone Amp)
          - type: media-control
