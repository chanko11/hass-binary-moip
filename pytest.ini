[pytest]
# Tests split into two groups (both run with a plain `pytest`):
#   - test_api_*.py exercise api.py, which depends only on aiohttp; conftest.py
#     loads it by file path so these run even without Home Assistant.
#   - test_config_flow/coordinator/media_player/init.py import the HA-backed
#     modules and rely on pytest-homeassistant-custom-component fixtures.
# See tests/README.md and requirements-dev.txt.
testpaths = tests
asyncio_mode = auto
addopts = -ra --cov=custom_components/binary_moip --cov-report=term-missing
